  <rect x="200" y="18" width="90" height="24" rx="6" fill="#3498db"/>
  <text x="245" y="35" text-anchor="middle" font-size="13" fill="white" font-weight="bold" font-family="system-ui" letter-spacing="2">UG65EW</text>
