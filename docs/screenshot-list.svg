  <rect x="590" y="80" width="60" height="38" rx="8" fill="white" stroke="#ddd" stroke-width="1"/>
  <text x="620" y="105" text-anchor="middle" font-size="15" fill="#95a5a6" font-family="system-ui">Qty</text>
  <rect x="660" y="80" width="100" height="38" rx="8" fill="#2ecc71"/>
  <text x="710" y="105" text-anchor="middle" font-size="15" fill="white" font-weight="bold" font-family="system-ui">Add</text>
  <text x="20" y="155" font-size="16" fill="#7f8c8d" font-family="system-ui">To Buy (2)</text>
  <line x1="20" y1="162" x2="780" y2="162" stroke="#ecf0f1"/>
  <rect x="20" y="172" width="760" height="42" rx="8" fill="white"/>
  <text x="35" y="198" font-size="15" fill="#2c3e50" font-family="system-ui">bread</text>
  <text x="95" y="198" font-size="14" fill="#7f8c8d" font-family="system-ui">×1</text>
  <text x="765" y="198" text-anchor="end" font-size="18" fill="#e74c3c" font-family="system-ui">✕</text>
  <rect x="20" y="220" width="760" height="42" rx="8" fill="white"/>
  <text x="35" y="246" font-size="15" fill="#2c3e50" font-family="system-ui">egg</text>
  <text x="95" y="246" font-size="14" fill="#7f8c8d" font-family="system-ui">×3</text>
  <text x="765" y="246" text-anchor="end" font-size="18" fill="#e74c3c" font-family="system-ui">✕</text>
  <text x="20" y="305" font-size="16" fill="#7f8c8d" font-family="system-ui" opacity="0.7">Bought (1)</text>
  <line x1="20" y1="312" x2="780" y2="312" stroke="#ecf0f1"/>
  <rect x="20" y="322" width="760" height="42" rx="8" fill="#ecf0f1"/>
  <text x="35" y="348" font-size="15" fill="#7f8c8d" font-family="system-ui" text-decoration="line-through">milk</text>
  <text x="95" y="348" font-size="14" fill="#95a5a6" font-family="system-ui">×2</text>
  <text x="765" y="348" text-anchor="end" font-size="18" fill="#e74c3c" font-family="system-ui">✕</text>
  <rect x="20" y="400" width="200" height="40" rx="8" fill="#f0e6f6"/>
  <text x="30" y="425" font-size="14" fill="#95a5a6" font-family="system-ui">🤖 "add milk and eggs"</text>
