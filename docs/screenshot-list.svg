  <text x="735" y="35" text-anchor="middle" font-size="14" fill="#2c3e50" font-family="system-ui">←</text>
  <text x="400" y="60" text-anchor="middle" font-size="13" fill="#7f8c8d" font-family="system-ui">Share code <tspan font-weight="bold">UG65EW</tspan> with your roommates to collaborate</text>
  <rect x="20" y="80" width="560" height="38" rx="8" fill="white" stroke="#ddd" stroke-width="1"/>
